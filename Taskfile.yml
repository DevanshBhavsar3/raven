version: "3"

vars:
  DB_MIGRATION_FOLDER: ./internal/database/migrations

tasks:
  run:
    desc: Start the raven application
    cmds:
      - echo "Starting Raven."
      - DOPPLER_TOKEN="$(doppler configs tokens create --project raven --config dev raven-dev-token --plain --max-age 1m)" doppler run -- docker compose up --build
      - echo "Raven started successfully."
  test:
    desc: Test raven application
    cmds:
      - doppler run -- go test ./...
  migrations:new:
    desc: Create a new database migration
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
      - |
        if [ -z "{{.NAME}}" ]; then
          echo "Error: name parameter is required"
          echo "Usage: task migrations:new name=migration_name"
          exit 1
        fi
      - echo 'Creating migration file for {{.NAME}}...'
      - docker run --rm -v {{.DB_MIGRATION_FOLDER}}:/migrations migrate/migrate create -ext sql -dir /migrations -seq {{.NAME}}
    silent: true
